<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>R6战术板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; }
        body {
            margin: 0;
            padding: 20px;
            background: #1a1d2f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .tactical-board {
            display: flex;
            gap: 20px;
            background: #0f111a;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex-wrap: wrap;
        }
        .sidebar {
            width: 280px;
            background: #1e243b;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar h3 {
            color: #e5e9f0;
            margin: 0 0 12px 0;
            font-size: 1.1rem;
            border-left: 4px solid #ff8c00;
            padding-left: 12px;
        }
        .tools {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tools button {
            background: #2a324b;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .tools button:hover, .active-tool {
            background: #ff8c00 !important;
        }
        .file-ops {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .file-ops button, .file-ops label {
            background: #2a324b;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
        }
        .file-ops button:hover, .file-ops label:hover {
            background: #ff8c00;
        }
        input[type="file"] { display: none; }
        .canvas-container {
            background: #1e1e2a;
            border-radius: 20px;
            box-shadow: 0 8px 20px black;
        }
        canvas {
            border-radius: 16px;
            display: block;
            border: 2px solid #4a5680;
        }
        .status {
            font-size: 12px;
            color: #b9c3e6;
            text-align: center;
            background: #0b0e16;
            padding: 6px;
            border-radius: 50px;
        }
        .map-control {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .map-control input {
            flex: 1;
            background: #2a324b;
            border: none;
            color: white;
            padding: 6px;
            border-radius: 20px;
        }
        .room-control {
            background: #0b0e16;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .room-control input {
            width: 80%;
            padding: 6px;
            margin: 6px 0;
            border-radius: 20px;
            border: none;
            text-align: center;
        }
        .room-control button {
            background: #ff8c00;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 4px;
        }
        button {
            background: #ff8c00;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="tactical-board">
    <div class="sidebar">
        <div class="room-control">
            <h3>🔗 自定义房间</h3>
            <input type="text" id="roomNameInput" placeholder="输入房间名称 (例如 clubhouse)">
            <div>
                <button id="createRoomBtn">🏠 创建房间 (房主)</button>
                <button id="joinRoomBtn">🚪 加入房间</button>
            </div>
            <div id="roomStatus" class="status" style="margin-top:6px">⚡ 未连接</div>
        </div>
        <div>
            <h3>🛠️ 工具</h3>
            <div class="tools" id="toolbar">
                <button id="selectTool" class="active-tool">🔍 选择</button>
                <button id="circleTool">⚪ 添加圆形</button>
                <button id="lineTool">📏 画线</button>
                <button id="textTool">📝 文字</button>
                <button id="deleteTool">🗑️ 删除</button>
                <button id="undoBtn">↩️ 撤销</button>
                <button id="clearBtn">🧹 清空画布</button>
            </div>
        </div>
        <div>
            <h3>🗺️ 地图 (由你提供)</h3>
            <div class="map-control">
                <input type="text" id="mapUrlInput" placeholder="输入地图图片URL 或 上传">
                <button id="loadMapBtn">加载地图</button>
            </div>
            <div class="map-control">
                <label for="uploadMap">📁 本地上传图片</label>
                <input type="file" id="uploadMap" accept="image/jpeg,image/png,image/webp">
            </div>
        </div>
        <div>
            <h3>💾 战术板管理</h3>
            <div class="file-ops">
                <button id="saveBtn">💾 保存战术 (JSON)</button>
                <label for="loadFile">📂 加载战术文件</label>
                <input type="file" id="loadFile" accept=".json">
                <button id="exportImgBtn">📸 导出为图片</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="tacticalCanvas" width="1000" height="600"></canvas>
    </div>
</div>

<script>
    // ---------- 多人同步 (PeerJS 房主模式) ----------
    let peer = null;
    let isHost = false;          // 当前用户是否是房主
    let connections = [];        // 房主储存所有连接，非房主只储存与房主的连接
    let hostConnection = null;   // 非房主与房主的连接
    let myId = null;
    let isSyncing = false;

    // 房主广播画布状态给所有成员
    function broadcastFullCanvas() {
        if (!isHost) return;              // 只有房主可以广播
        if (isSyncing) return;
        isSyncing = true;
        const canvasJSON = JSON.stringify(canvas.toJSON());
        for (let conn of connections) {
            if (conn.open) {
                conn.send({ type: 'sync', canvasJSON });
            }
        }
        setTimeout(() => { isSyncing = false; }, 50);
    }

    // 非房主发送自己的操作（实际上所有操作由房主广播，非房主只需告知房主自己做了改动，房主再广播）
    // 为了简单，我们让所有非房主的画布操作都通过房主转发：非房主不直接广播，而是将操作发送给房主，房主再同步给大家。
    // 但为了代码复用，我们统一：任何画布改动都调用 sendCanvasUpdate，房主广播给所有人，非房主发送给房主。
    function sendCanvasUpdate() {
        if (isSyncing) return;
        const canvasJSON = JSON.stringify(canvas.toJSON());
        if (isHost) {
            // 房主广播
            isSyncing = true;
            for (let conn of connections) {
                if (conn.open) conn.send({ type: 'sync', canvasJSON });
            }
            setTimeout(() => { isSyncing = false; }, 50);
        } else {
            // 非房主发送给房主
            if (hostConnection && hostConnection.open) {
                hostConnection.send({ type: 'sync', canvasJSON });
            }
        }
    }

    // 接收来自房主或成员的同步消息
    function applySync(canvasJSON) {
        if (!isSyncing) {
            isSyncing = true;
            canvas.loadFromJSON(canvasJSON, () => {
                canvas.renderAll();
                isSyncing = false;
            });
        }
    }

    // 创建房主 Peer
    function createHost(roomName) {
        if (peer) peer.destroy();
        peer = new Peer(roomName);   // 使用房间名作为房主的ID
        peer.on('open', id => {
            myId = id;
            isHost = true;
            document.getElementById('roomStatus').innerHTML = `✅ 房主模式，房间名: ${id} | 等待成员加入...`;
        });
        peer.on('connection', conn => {
            connections.push(conn);
            conn.on('data', data => {
                if (data.type === 'sync') {
                    // 成员发送来的画布更新，房主自动广播给所有人（包括自己不需要再加载）
                    // 注意：这里不需要再 applySync，因为房主自己操作已经触发过更新，直接转发
                    for (let c of connections) {
                        if (c !== conn && c.open) c.send(data);
                    }
                }
            });
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                document.getElementById('roomStatus').innerHTML = `✅ 房主 | 当前成员数: ${connections.length}`;
            });
            // 连接成功后，把当前画布状态发给新成员
            conn.on('open', () => {
                conn.send({ type: 'sync', canvasJSON: JSON.stringify(canvas.toJSON()) });
                document.getElementById('roomStatus').innerHTML = `✅ 房主 | 当前成员数: ${connections.length}`;
            });
        });
        peer.on('error', err => {
            console.error(err);
            if (err.type === 'peer-unavailable') {
                document.getElementById('roomStatus').innerHTML = `❌ 房间名已被占用，请换一个名称`;
            } else {
                document.getElementById('roomStatus').innerHTML = `❌ 创建失败: ${err.message}`;
            }
            isHost = false;
        });
    }

    // 成员加入 (连接到房主)
    function joinRoom(roomName) {
        if (peer) peer.destroy();
        peer = new Peer();   // 随机ID
        peer.on('open', id => {
            myId = id;
            isHost = false;
            const conn = peer.connect(roomName);
            hostConnection = conn;
            conn.on('open', () => {
                document.getElementById('roomStatus').innerHTML = `✅ 已加入房间: ${roomName}`;
            });
            conn.on('data', data => {
                if (data.type === 'sync') {
                    applySync(data.canvasJSON);
                }
            });
            conn.on('close', () => {
                document.getElementById('roomStatus').innerHTML = `⚠️ 与房主断开，请刷新页面重新加入`;
                hostConnection = null;
            });
            conn.on('error', err => {
                document.getElementById('roomStatus').innerHTML = `❌ 连接失败: ${err.message}`;
            });
        });
        peer.on('error', err => {
            document.getElementById('roomStatus').innerHTML = `❌ 加入失败: ${err.message}`;
        });
    }

    // 界面按钮
    document.getElementById('createRoomBtn').addEventListener('click', () => {
        const roomName = document.getElementById('roomNameInput').value.trim();
        if (!roomName) {
            alert('请输入房间名称');
            return;
        }
        createHost(roomName);
    });
    document.getElementById('joinRoomBtn').addEventListener('click', () => {
        const roomName = document.getElementById('roomNameInput').value.trim();
        if (!roomName) {
            alert('请输入房间名称');
            return;
        }
        joinRoom(roomName);
    });

    // ---------- Fabric 画布初始化 ----------
    const canvas = new fabric.Canvas('tacticalCanvas');
    canvas.setBackgroundColor('#24273a', canvas.renderAll.bind(canvas));
    // 网格背景
    const gridSize = 40;
    for (let i = 0; i < canvas.width; i += gridSize) {
        canvas.add(new fabric.Line([i, 0, i, canvas.height], { stroke: '#3b4270', strokeWidth: 0.8, selectable: false, evented: false }));
        canvas.add(new fabric.Line([0, i, canvas.width, i], { stroke: '#3b4270', strokeWidth: 0.8, selectable: false, evented: false }));
    }
    canvas.getObjects().forEach(obj => { if (!obj.selectable) canvas.sendToBack(obj); });
    canvas.selection = true;

    // 历史记录（本地撤销，不参与同步，但多人状态下撤销后会自动同步）
    let historyStack = [], historyIndex = -1;
    function saveHistory() {
        if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(JSON.stringify(canvas.toJSON()));
        historyIndex = historyStack.length - 1;
    }
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            canvas.loadFromJSON(historyStack[historyIndex], () => {
                canvas.renderAll();
                sendCanvasUpdate();
            });
        }
    }
    // 监听画布变化并同步
    function onCanvasChange() {
        saveHistory();
        sendCanvasUpdate();
    }
    canvas.on('object:added', onCanvasChange);
    canvas.on('object:removed', onCanvasChange);
    canvas.on('object:modified', onCanvasChange);

    // 清空画布
    function clearCanvas() {
        canvas.getObjects().forEach(obj => { if (obj.selectable !== false) canvas.remove(obj); });
        canvas.renderAll();
        sendCanvasUpdate();
    }
    document.getElementById('clearBtn').onclick = () => { if(confirm('清空所有标记？')) clearCanvas(); };
    document.getElementById('undoBtn').onclick = () => undo();

    // 地图加载
    function setMapBackground(imgUrl) {
        fabric.Image.fromURL(imgUrl, img => {
            img.set({ scaleX: canvas.width / img.width, scaleY: canvas.height / img.height, selectable: false, evented: false });
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            sendCanvasUpdate();
        });
    }
    document.getElementById('loadMapBtn').onclick = () => {
        const url = document.getElementById('mapUrlInput').value;
        if(url) setMapBackground(url);
    };
    document.getElementById('uploadMap').onchange = e => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = ev => setMapBackground(ev.target.result);
            reader.readAsDataURL(file);
        }
    };

    // 生成圆形 + 居中文字
    function createNamedCircle(left, top, name) {
        const circleRadius = 30;
        const circle = new fabric.Circle({
            radius: circleRadius,
            fill: '#3a6ea5',
            stroke: '#ffffff',
            strokeWidth: 2,
            originX: 'center',
            originY: 'center',
            hasControls: true,
            hasBorders: true
        });
        const text = new fabric.Text(name, {
            fontSize: 14,
            fill: 'white',
            fontWeight: 'bold',
            originX: 'center',
            originY: 'center',
            fontFamily: 'Arial'
        });
        return new fabric.Group([circle, text], {
            left, top,
            originX: 'center',
            originY: 'center',
            hasControls: true,
            hasBorders: true
        });
    }

    // 工具管理
    let currentTool = 'select';
    let lineStart = null, tempLine = null;

    function setTool(tool) {
        currentTool = tool;
        if (lineStart) {
            if (tempLine) canvas.remove(tempLine);
            lineStart = null;
            tempLine = null;
        }
        document.querySelectorAll('#toolbar button').forEach(btn => btn.classList.remove('active-tool'));
        if (tool === 'select') document.getElementById('selectTool').classList.add('active-tool');
        if (tool === 'circle') document.getElementById('circleTool').classList.add('active-tool');
        if (tool === 'line') document.getElementById('lineTool').classList.add('active-tool');
        if (tool === 'text') document.getElementById('textTool').classList.add('active-tool');
        if (tool === 'delete') document.getElementById('deleteTool').classList.add('active-tool');
    }

    function addCircleAt(pointer) {
        const name = prompt('输入标记名称（将显示在圆内）:', '队员');
        if (name && name.trim() !== '') {
            canvas.add(createNamedCircle(pointer.x, pointer.y, name.trim()));
            canvas.renderAll();
            sendCanvasUpdate();
        }
    }

    canvas.on('mouse:down', (e) => {
        if (currentTool === 'delete' && e.target) {
            canvas.remove(e.target);
            sendCanvasUpdate();
        }
        else if (currentTool === 'text' && !e.target) {
            const p = canvas.getPointer(e.e);
            const txt = prompt('战术标注文字:');
            if (txt) {
                canvas.add(new fabric.IText(txt, { left: p.x, top: p.y, fontSize: 18, fill: '#fff', backgroundColor: 'rgba(0,0,0,0.6)' }));
                sendCanvasUpdate();
            }
        }
        else if (currentTool === 'circle' && !e.target) {
            const p = canvas.getPointer(e.e);
            addCircleAt(p);
        }
        else if (currentTool === 'line' && !e.target) {
            const p = canvas.getPointer(e.e);
            if (!lineStart) {
                lineStart = p;
                tempLine = new fabric.Line([p.x, p.y, p.x, p.y], { stroke: 'orange', strokeDashArray: [8,6], selectable: false });
                canvas.add(tempLine);
            }
        }
    });

    canvas.on('mouse:move', (e) => {
        if (currentTool === 'line' && lineStart && tempLine) {
            const p = canvas.getPointer(e.e);
            tempLine.set({ x2: p.x, y2: p.y });
            canvas.renderAll();
        }
    });

    canvas.on('mouse:up', (e) => {
        if (currentTool === 'line' && lineStart) {
            const end = canvas.getPointer(e.e);
            if (Math.hypot(end.x - lineStart.x, end.y - lineStart.y) > 5) {
                const lineGroup = new fabric.Group([
                    new fabric.Line([lineStart.x, lineStart.y, end.x, end.y], { stroke: '#ffaa44', strokeWidth: 3 }),
                    new fabric.Triangle({
                        left: end.x, top: end.y, width: 12, height: 12, fill: '#ffaa44',
                        angle: Math.atan2(end.y - lineStart.y, end.x - lineStart.x) * 180 / Math.PI + 90
                    })
                ]);
                canvas.add(lineGroup);
                sendCanvasUpdate();
            }
            if (tempLine) canvas.remove(tempLine);
            lineStart = null;
            tempLine = null;
        }
    });

    document.getElementById('selectTool').onclick = () => setTool('select');
    document.getElementById('circleTool').onclick = () => setTool('circle');
    document.getElementById('lineTool').onclick = () => setTool('line');
    document.getElementById('textTool').onclick = () => setTool('text');
    document.getElementById('deleteTool').onclick = () => setTool('delete');

    // 保存/加载/导出
    document.getElementById('saveBtn').onclick = () => {
        const data = JSON.stringify(canvas.toJSON());
        const blob = new Blob([data], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tactical.json';
        a.click();
    };
    document.getElementById('loadFile').onchange = e => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = ev => {
                canvas.loadFromJSON(ev.target.result, () => {
                    canvas.renderAll();
                    sendCanvasUpdate();
                });
            };
            reader.readAsText(file);
        }
    };
    document.getElementById('exportImgBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'tactical.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    // 添加两个示例圆形
    canvas.add(createNamedCircle(200, 200, 'A点'));
    canvas.add(createNamedCircle(450, 350, 'B点'));
    saveHistory();
</script>
</body>
</html>
